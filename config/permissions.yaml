# Permissions for Andy (geminiOS)
default:
  model: gemini-3.5-flash
  thinking_level: 0 # 0 = off, 1 = on

channels:
  main:
    model: gemini-3.1-flash-lite
    thinking_level: 0
  misc:
    model: gemini-3.1-flash-lite
    thinking_level: 0
  devops:
    model: gemini-3.1-pro-preview
    thinking_level: 1
  weather:
    model: gemini-3.5-flash
    thinking_level: 0

tools:
  allow: [] # Empty means allow all unless explicitly denied
  deny: []

bash:
  allow:
    - "trash-list"
    - "trash-put"
    - "df -h"
    - "free -m"
    - "uptime"
    - "ssh"
  deny:
    - "rm"
    - "mv"
    - "sudo"
    - "kill"
    - "shutdown"
    - "reboot"
    - "systemctl"
